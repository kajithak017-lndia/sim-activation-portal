<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ID Proof Validation</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="style.css">
</head>

<body>

	<div class="page-shell">

		<header class="site-header compact">

			<h2>SIM Activation Portal</h2>

			<nav class="site-nav">
				<a href="index.html">Home</a>
				<a href="id-proof.html" class="active">ID Proof</a>
				<a href="address.html">Update Address</a>
				<a href="activation.html">Activation</a>
			</nav>

		</header>

		<main class="form-layout">

			<section class="form-section">

				<p class="eyebrow">Step 4</p>

				<h2>ID Proof Validation</h2>

				<p style="color:#666;margin-bottom:20px;">
					Enter the Customer ID of an existing customer and provide a valid Government ID proof.
				</p>

				<label for="id">Customer ID</label>

				<input id="id" type="number" placeholder="Enter Existing Customer ID" required>

				<label for="idProof">Government ID Proof Number</label>

				<input id="idProof" type="text" placeholder="Example: Aadhaar / Passport / Driving Licence Number"
					required>

				<button type="button" onclick="updateIdProof()">
					Save ID Proof
				</button>

				<button type="button" onclick="validateId()">
					Validate ID Proof
				</button>

				<div id="responseBox" class="success" style="display:none;">
				</div>

			</section>

		</main>

	</div>

	<script src="script.js"></script>

</body>

</html>
