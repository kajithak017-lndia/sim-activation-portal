<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Update Address</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="style.css">
</head>

<body>

	<div class="page-shell">

		<header class="site-header compact">

			<h2>SIM Activation Portal</h2>

			<nav class="site-nav">
				<a href="index.html">Home</a>
				<a href="customer.html">Customer</a>
				<a href="id-proof.html">ID Proof</a>
				<a href="address.html" class="active">Update Address</a>
				<a href="activation.html">Activation</a>
			</nav>

		</header>

		<main class="form-layout">

			<section class="form-section">

				<p class="eyebrow">Step 3</p>

				<h2>Update Address</h2>

				<p style="color:#666;margin-bottom:20px;">
					Enter the Customer ID of an existing customer and provide the complete address.
				</p>

				<label for="id">Customer ID</label>
				<input id="id" type="number" placeholder="Enter Existing Customer ID" required>

				<label for="houseNo">House / Flat Number</label>
				<input id="houseNo" type="text" placeholder="Enter House / Flat Number" required>

				<label for="street">Street / Area</label>
				<input id="street" type="text" placeholder="Enter Street / Area" required>

				<label for="city">City</label>
				<input id="city" type="text" placeholder="Enter City" required>

				<label for="state">State</label>
				<input id="state" type="text" placeholder="Enter State" required>

				<label for="pincode">Pincode</label>
				<input id="pincode" type="text" placeholder="Enter Pincode" required>

				<label for="proofType">Address Proof Type</label>

				<select id="proofType">

					<option value="">Select Proof Type</option>
					<option>Aadhaar Card</option>
					<option>Utility Bill</option>
					<option>Bank Statement</option>
					<option>Rental Agreement</option>

				</select>

				<label for="address">Generated Address</label>

				<textarea id="address" placeholder="Your complete address will appear here">
</textarea>

				<button type="button" onclick="
document.getElementById('address').value=[
val('houseNo'),
val('street'),
val('city'),
val('state'),
val('pincode')
].filter(Boolean).join(', ');
updateAddress();
">

					Save Updated Address

				</button>

				<div id="responseBox" class="success" style="display:none;">
				</div>

			</section>

		</main>

	</div>

	<script src="script.js"></script>

</body>

</html>
