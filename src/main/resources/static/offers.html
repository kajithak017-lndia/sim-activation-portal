<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Offers</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page-shell">

<header class="site-header compact">

<h2>SIM Activation Portal</h2>

<nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="offers.html" class="active">Offers</a>
    <a href="address.html">Update Address</a>
    <a href="activation.html">Activation</a>
</nav>

</header>

<main class="form-layout">

<section class="form-section">

<p class="eyebrow">Promotions</p>

<h2>Special Offers</h2>

<p style="color:#666; margin-bottom:20px;">
Enter an <strong>activated SIM Number</strong> to view the offers currently available for that SIM.
Inactive SIMs are not eligible for promotional offers.
</p>

<label for="simNumber">SIM Number</label>

<input
id="simNumber"
type="text"
placeholder="Example: SIM1003"
required>

<button
type="button"
onclick="getOffers()">
View Available Offers
</button>

<div
id="responseBox"
class="success"
style="display:none;">
</div>

</section>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
