<html lang="en">

<head>
	<meta charset="UTF-8">

	<link rel="preconnect" href="https://fonts.googleapis.com">

	<div class="page-shell">

			<section class="form-section">

				<p class="eyebrow">Final Step</p>

				<p style="margin-bottom:20px;color:#666;">
					Enter the SIM Number to activate the SIM.
					Customer details, address and ID proof should already be completed in the previous steps.

				<label for="simNumber">SIM Number</label>

				<input id="simNumber" type="text" placeholder="Enter SIM Number">

				<button type="button" onclick="activateSim()">

				</button>

				<div id="responseBox" class="success" style="display:none;">
